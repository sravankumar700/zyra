<!DOCTYPE html>
<html>
<head>
    <title>AI Avatar Interview Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AI Avatar Interview</h1>
    <p class="subtitle">Choose a profession and job role to start a role-specific interview.</p>

    <div class="selection-panel">
        <label for="professionSelect">Profession</label>
        <select id="professionSelect" onchange="updateJobRoles()">
            <option value="">Select profession</option>
        </select>

        <label for="jobRoleSelect">Job Role</label>
        <select id="jobRoleSelect">
            <option value="">Select job role</option>
        </select>
    </div>

    <div class="container">

        <!-- AI Avatar Section -->
        <div class="avatar-section">
            <img id="avatar" src="undefined - Imgur.jpg" />
            <p id="ai-text">Click start to begin interview</p>
        </div>

        <!-- Candidate Video -->
        <div class="video-section">
            <video id="candidateVideo" autoplay></video>
        </div>

    </div>

    <p id="selected-role" class="selected-role">No role selected</p>
    <button onclick="startInterview()">Start Interview</button>

    <script src="script.js"></script>
</body>
</html>
