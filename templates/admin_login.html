<!-- templates/admin_login.html -->
<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>HR Login — zyra</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="ai-motion-bg" aria-hidden="true">
    <span class="ai-float one" data-icon="AI"></span>
    <span class="ai-float two" data-icon="ML"></span>
    <span class="ai-float three" data-icon="01"></span>
    <span class="ai-float four" data-icon="BOT"></span>
    <span class="ai-float five" data-icon="CV"></span>
  </div>
  <div class="wrap">
    <div class="card form-card">
      <h1>HR Panel Login</h1>
      <form id="adminLoginForm">
        <div class="row"><input name="username" placeholder="Admin username" required /></div>
        <div class="row"><input name="password" placeholder="Password" type="password" required /></div>
        <div class="row"><button class="btn" type="submit">Login</button></div>
      </form>
      <div id="adminLoginMsg"></div>
    </div>
  </div>
  <script>
    document.getElementById("adminLoginForm")?.addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(e.target).entries());
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      const msg = document.getElementById("adminLoginMsg");
      if (res.ok) {
        msg.textContent = "Login successful. Opening dashboard...";
        window.location.href = "/";
        return;
      }
      msg.textContent = data.error || "Login failed";
    });
  </script>
</body>

</html>
