<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Zyra</title>
  <link rel="stylesheet" href="../static/css/global.css" />
  <link rel="stylesheet" href="../static/css/dashboard.css" />
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="dashboard-layout">
    <div class="admin-container">
      <div class="admin-card">
        <aside class="admin-sidebar">
          <div class="admin-user-avatar">HR</div>
          <div class="admin-username">Recruiter Panel</div>

          <button class="sidebar-btn" data-view="Job Listings" style="opacity:1;">Job Listings</button>
          <button class="sidebar-btn" data-view="Shortlisted">Shortlisted</button>
          <button class="sidebar-btn" data-view="Rejected">Rejected</button>
          <button class="sidebar-btn new-job" id="new-job-btn">+ New Job</button>
          <button class="sidebar-btn" data-view="Reports">Reports</button>
        </aside>

        <main class="admin-main">
          <div class="admin-header">
            <h1 class="admin-header-title">Admin Dashboard</h1>
            <button class="admin-notif-btn" type="button" aria-label="Notifications">
              !
              <span class="notif-badge"></span>
            </button>
            <div class="admin-avatar">HR</div>
            <button class="admin-logout-btn" id="admin-logout-btn" type="button">Logout</button>
          </div>

          <h2 class="admin-main-title" id="main-title">Job Listings</h2>
          <div id="admin-content">
            <table class="job-table">
              <tbody id="jobs-tbody"></tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="../static/js/cursor.js"></script>
  <script src="../static/js/main.js"></script>
  <script src="../static/js/admin.js"></script>
</body>
</html>
