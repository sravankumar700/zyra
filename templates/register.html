<!-- templates/register.html -->
<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Apply — zyra</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="ai-motion-bg" aria-hidden="true">
    <span class="ai-float one" data-icon="AI"></span>
    <span class="ai-float two" data-icon="ML"></span>
    <span class="ai-float three" data-icon="01"></span>
    <span class="ai-float four" data-icon="BOT"></span>
    <span class="ai-float five" data-icon="CV"></span>
  </div>
  <div class="wrap">
    <div class="card form-card">
      <h1>Register for zyra</h1>
      <p>Fill your details. Resume (PDF) is compulsory.</p>
      <form id="applyForm" enctype="multipart/form-data" method="post" action="/api/apply">
        <div class="row">
          <input name="first_name" placeholder="First name" required />
          <input name="middle_name" placeholder="Middle name" />
          <input name="last_name" placeholder="Last name" required />
        </div>
        <div class="row">
          <input type="date" name="dob" required />
          <input name="email" placeholder="Email" type="email" required />
          <input name="phone" placeholder="Phone" required />
        </div>
        <div class="row">
          <input name="address" placeholder="Address" required />
        </div>
        <div class="row">
          <input name="skills" placeholder="Skills (comma separated)" required />
          <select name="job_id" id="registerJobSelect" required>
            <option value="">Loading open jobs...</option>
          </select>
        </div>
        <div class="row">
          <div id="registerJobPreview" class="job-preview-card">Select a role to preview its description, salary, skills, and location.</div>
        </div>
        <div class="row">
          <div id="jobLoadStatus"></div>
        </div>
        <div class="row">
          <label>Upload Resume (PDF)</label>
          <input name="resume" type="file" accept="application/pdf" required />
        </div>
        <div class="row">
          <button type="submit" class="btn">Submit Application</button>
        </div>
      </form>
      <div id="applyResult"></div>
    </div>
  </div>

  <script>
    let registerJobsCache = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderRegisterJobPreview(jobId) {
      const preview = document.getElementById("registerJobPreview");
      const job = registerJobsCache.find(item => item.id === jobId);
      if (!job) {
        preview.innerText = "Select a role to preview its description, salary, skills, and location.";
        return;
      }
      preview.innerHTML = `
        <div class="job-preview-head">
          <div>
            <div class="job-preview-kicker">Role Preview</div>
            <h3>${escapeHtml(job.title || "Open Role")}</h3>
            <p>${escapeHtml(job.description || "No role description available yet.")}</p>
          </div>
          <div class="job-preview-tags">
            ${job.profession ? `<span>${escapeHtml(job.profession)}</span>` : ""}
            ${job.salary_range ? `<span>${escapeHtml(job.salary_range)}</span>` : ""}
          </div>
        </div>
        <div class="job-preview-grid">
          <div>
            <strong>Department</strong>
            <p>${escapeHtml(job.department || "-")}</p>
          </div>
          <div>
            <strong>Location</strong>
            <p>${escapeHtml(job.location || "-")}</p>
          </div>
          <div>
            <strong>Employment Type</strong>
            <p>${escapeHtml(job.employment_type || "-")}</p>
          </div>
          <div>
            <strong>Experience</strong>
            <p>${escapeHtml(job.experience || "-")}</p>
          </div>
          <div class="wide">
            <strong>Required Skills</strong>
            <p>${escapeHtml(Array.isArray(job.required_skills) ? job.required_skills.join(", ") : "-")}</p>
          </div>
          <div class="wide">
            <strong>Preferred Skills</strong>
            <p>${escapeHtml(Array.isArray(job.preferred_skills) && job.preferred_skills.length ? job.preferred_skills.join(", ") : "-")}</p>
          </div>
        </div>
      `;
    }

    async function loadRegisterJobs() {
      const select = document.getElementById("registerJobSelect");
      const status = document.getElementById("jobLoadStatus");
      try {
        const res = await fetch("/api/jobs");
        const data = await res.json();
        const jobs = Array.isArray(data.jobs) ? data.jobs : [];
        registerJobsCache = jobs;
        if (!jobs.length) {
          select.innerHTML = '<option value="">No open jobs available</option>';
          status.innerText = "No open jobs are available right now.";
          renderRegisterJobPreview("");
          return;
        }
        select.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Select Open Job";
        select.appendChild(placeholder);
        jobs.forEach(job => {
          const option = document.createElement("option");
          option.value = String(job.id || "");
          option.textContent = `${job.title || "Open Role"}${job.profession ? ` - ${job.profession}` : ""} - ${job.location || "Location TBA"}`;
          select.appendChild(option);
        });
        status.innerText = "";
        renderRegisterJobPreview(select.value);
      } catch (e) {
        select.innerHTML = '<option value="">Unable to load jobs</option>';
        status.innerText = "Unable to load jobs right now. Please refresh and try again.";
        renderRegisterJobPreview("");
      }
    }

    loadRegisterJobs();

    document.getElementById("registerJobSelect").addEventListener("change", (e) => {
      renderRegisterJobPreview(e.target.value);
    });

    document.getElementById("applyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const btn = e.target.querySelector(".btn");
      btn.disabled = true; btn.textContent = "Submitting...";

      const res = await fetch("/api/apply", { method: "POST", body: fd });
      const data = await res.json();
      if (res.ok) {
        document.getElementById("applyResult").innerText = data.message || "Application submitted successfully.";
        e.target.reset();
        renderRegisterJobPreview("");
      } else {
        document.getElementById("applyResult").innerText = "Error: " + (data.error || JSON.stringify(data));
      }
      btn.disabled = false; btn.textContent = "Submit Application";
    });
  </script>
</body>

</html>
